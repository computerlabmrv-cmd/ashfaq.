<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Rise - Glide Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #gameWrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 92vh;
            background: #050505;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 30px;
            text-align: center;
        }

        .neon-btn {
            background: transparent;
            color: #fff;
            padding: 15px 45px;
            border-radius: 15px;
            font-weight: 800;
            border: 2px solid #00ffff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px #00ffff;
            transition: 0.3s;
        }

        .neon-btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 30px #00ffff;
            transform: scale(1.05);
        }

        .game-title {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(0,255,255,0.5));
        }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <div id="ui">
            <div class="stat-card">
                <span class="text-[10px] uppercase font-black text-cyan-400">Altitude</span>
                <div id="scoreVal" class="text-xl font-black">0</div>
            </div>
            <div class="stat-card">
                <span class="text-[10px] uppercase font-black text-pink-500">Best</span>
                <div id="highScoreVal" class="text-xl font-black">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="overlay">
            <h1 class="game-title">NEON GLIDE</h1>
            <p class="text-slate-400 mb-8">Parannu uyarnnu poku! Air currents ninnale sahayikkum.</p>
            
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 text-sm mb-8 text-slate-300">
                <b>Control:</b> <br>
                Mouse/Touch neekkumpol glider move aakum. <br>
                Neela nirathilulla currents (Air Boost) thodumpol uyaraam!
            </div>

            <button onclick="startGame()" class="neon-btn">Launch Glide</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('scoreVal');
        const highScoreVal = document.getElementById('highScoreVal');
        const overlay = document.getElementById('overlay');
        const wrapper = document.getElementById('gameWrapper');

        let width, height, highScore = 0;
        let gameActive = false, score = 0, cameraY = 0;
        let platforms = [], particles = [], trail = [], currents = [];
        
        const colors = ['#00ffff', '#ff00ff', '#ffff00', '#00ff00', '#ff3300'];

        const player = {
            x: 0, y: 0,
            w: 30, h: 20,
            vx: 0, vy: 0,
            gravity: 0.18,
            drag: 0.97,
            hue: 180
        };

        function resize() {
            width = canvas.width = canvas.offsetWidth;
            height = canvas.height = canvas.offsetHeight;
            if(!gameActive) initGame();
        }
        window.addEventListener('resize', resize);
        resize();

        // Input
        const handleInput = (e) => {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const inputX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            player.vx = (inputX - player.x) * 0.12;
        };
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchmove', handleInput, {passive: false});

        function initGame() {
            player.x = width / 2;
            player.y = height / 2;
            player.vy = 0;
            score = 0;
            cameraY = 0;
            platforms = [];
            particles = [];
            trail = [];
            currents = [];
            
            // Initial Objects
            for(let i=0; i<6; i++) spawnCurrent(height - (i * 150));
            for(let i=0; i<4; i++) spawnDecoration(height - (i * 200));
        }

        function spawnCurrent(y) {
            currents.push({
                x: Math.random() * (width - 60) + 30,
                y: y,
                r: 35 + Math.random() * 15,
                color: colors[Math.floor(Math.random() * colors.length)],
                pulse: 0
            });
        }

        function spawnDecoration(y) {
            platforms.push({
                x: Math.random() * width,
                y: y,
                w: 40 + Math.random() * 40,
                h: 2,
                color: 'rgba(255,255,255,0.1)'
            });
        }

        function createBurst(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random()-0.5)*8,
                    vy: (Math.random()-0.5)*8,
                    life: 1,
                    color,
                    size: Math.random()*3+1
                });
            }
        }

        function update() {
            if(!gameActive) return;

            // Physics
            player.vy += player.gravity;
            player.y += player.vy;
            player.x += player.vx;
            player.vx *= player.drag;

            // Trail
            trail.push({x: player.x, y: player.y, life: 1});
            if(trail.length > 15) trail.shift();

            // Screen Wrap (Horizontal)
            if(player.x < 15) player.x = 15;
            if(player.x > width - 15) player.x = width - 15;

            // Camera movement (Rising)
            if(player.y < height * 0.45) {
                let diff = height * 0.45 - player.y;
                player.y = height * 0.45;
                cameraY += diff;
                score = Math.floor(cameraY / 10);
                scoreVal.innerText = score;

                // Move environment
                currents.forEach(c => {
                    c.y += diff;
                    if(c.y > height + 50) {
                        c.y = -50;
                        c.x = Math.random() * (width - 60) + 30;
                        c.color = colors[Math.floor(Math.random() * colors.length)];
                    }
                });
                platforms.forEach(p => {
                    p.y += diff;
                    if(p.y > height + 50) {
                        p.y = -50;
                        p.x = Math.random() * width;
                    }
                });
            }

            // Current Collision (Boost)
            currents.forEach(c => {
                let d = Math.hypot(player.x - c.x, player.y - c.y);
                if(d < c.r + 15) {
                    player.vy = -7.5; // Glide Boost
                    createBurst(player.x, player.y, c.color);
                    player.hue = (player.hue + 2) % 360;
                }
            });

            // Fail Condition
            if(player.y > height + 50) endGame();

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            // Dynamic BG
            const bgHue = (score / 10) % 360;
            ctx.fillStyle = `hsla(${bgHue}, 20%, 3%, 1)`;
            ctx.fillRect(0,0, width, height);

            // Decoration lines
            platforms.forEach(p => {
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(p.x - p.w, p.y);
                ctx.lineTo(p.x + p.w, p.y);
                ctx.stroke();
            });

            // Trail
            trail.forEach((t, i) => {
                ctx.fillStyle = `hsla(${player.hue}, 100%, 50%, ${t.life * 0.2})`;
                ctx.beginPath();
                ctx.arc(t.x, t.y, 8 * t.life, 0, Math.PI*2);
                ctx.fill();
                t.life -= 0.05;
            });

            // Currents
            currents.forEach(c => {
                c.pulse += 0.05;
                let s = c.r + Math.sin(c.pulse) * 4;
                ctx.strokeStyle = c.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = c.color;
                ctx.beginPath();
                ctx.arc(c.x, c.y, s, 0, Math.PI*2);
                ctx.stroke();
                
                ctx.fillStyle = c.color;
                ctx.globalAlpha = 0.1;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            });

            // Player (Glider)
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.vx * 0.04);
            
            ctx.fillStyle = `hsla(${player.hue}, 100%, 60%, 1)`;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsla(${player.hue}, 100%, 60%, 1)`;
            
            // Neon Wings
            ctx.beginPath();
            ctx.moveTo(-20, 0);
            ctx.lineTo(20, 0);
            ctx.lineTo(0, -12);
            ctx.closePath();
            ctx.fill();
            
            // Center Glow
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.roundRect(-4, -4, 8, 12, 2);
            ctx.fill();
            
            ctx.restore();
            ctx.shadowBlur = 0;

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;
        }

        function startGame() {
            gameActive = true;
            overlay.style.display = 'none';
            initGame();
            requestAnimationFrame(update);
        }

        function endGame() {
            gameActive = false;
            if(score > highScore) highScore = score;
            highScoreVal.innerText = highScore;
            overlay.style.display = 'flex';
            overlay.querySelector('.game-title').innerText = "STALLED!";
            overlay.querySelector('p').innerHTML = `Altitude: <span class="text-white text-4xl font-black">${score}ft</span>`;
            overlay.querySelector('button').innerText = "Relaunch Glide";
        }
    </script>
</body>
</html>
